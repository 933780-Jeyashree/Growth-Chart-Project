<div class="container">

  <div class="form-header">
    <h1>Growth Chart</h1>
    <p>Patient Data Entry</p>
  </div>

  <!-- Patient Section -->
  <div class="section-label">Patient</div>

  <div class="form-group">
    <label for="uhidInput">Patient ID <span class="optional">— enter to auto-fill</span></label>
    <input
      id="uhidInput"
      type="text"
      [(ngModel)]="uhid"
      (input)="onUhidInput()"
      placeholder="UHID / Registration No."
      maxlength="50"
    />
    <small *ngIf="uhidMessage" [class]="uhidFound ? 'age-preview' : 'field-error'">{{ uhidMessage }}</small>
  </div>

  <div class="form-group">
    <input
      id="nameInput"
      type="text"
      [(ngModel)]="patientName"
      maxlength="255"
      placeholder="Full Name *"
      class="input-large"
    />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="dobInput">Date of Birth *</label>
      <input
        id="dobInput"
        type="text"
        [(ngModel)]="dobDisplay"
        (input)="onDobInput($event)"
        placeholder="DD/MM/YYYY"
        maxlength="10"
      />
      <small *ngIf="dob" class="age-preview">{{ getAgeDisplay() }}</small>
      <small *ngIf="dobError" class="field-error">{{ dobError }}</small>
    </div>
    <div class="form-group">
      <label for="genderSelect">Gender *</label>
      <select id="genderSelect" [(ngModel)]="gender">
        <option value="other">Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>
  </div>

  <!-- Measurements Section -->
  <div class="section-label">Measurements</div>

  <div class="form-row">
    <div class="form-group">
      <label for="heightInput">Height (cm)</label>
      <input id="heightInput" type="number" [(ngModel)]="height" min="0" step="0.1" placeholder="e.g. 92.0" />
    </div>
    <div class="form-group">
      <label for="weightInput">Weight (kg)</label>
      <input id="weightInput" type="number" [(ngModel)]="weight" min="0" step="0.1" placeholder="e.g. 14.5" />
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="headCircInput">Head Circumference (cm) <span class="optional">— optional</span></label>
      <input id="headCircInput" type="number" [(ngModel)]="headCircumference" min="0" step="0.1" placeholder="e.g. 48.0" />
    </div>
    <div class="form-group">
      <label for="obsDateInput">Visit Date <span class="optional">(blank = today)</span></label>
      <input
        id="obsDateInput"
        type="text"
        [(ngModel)]="obsDateDisplay"
        (input)="onObsDateInput($event)"
        placeholder="DD/MM/YYYY"
        maxlength="10"
      />
      <small *ngIf="obsDateError" class="field-error">{{ obsDateError }}</small>
    </div>
  </div>

  <!-- Parental Heights Section -->
  <div class="section-label">Parental Heights <span class="optional">— optional</span></div>

  <div class="form-row">
    <div class="form-group">
      <label for="fatherHeightInput">Father's Height (cm)</label>
      <input id="fatherHeightInput" type="number" [(ngModel)]="fatherHeight" min="100" max="220" step="0.1" placeholder="e.g. 175" />
    </div>
    <div class="form-group">
      <label for="motherHeightInput">Mother's Height (cm)</label>
      <input id="motherHeightInput" type="number" [(ngModel)]="motherHeight" min="100" max="220" step="0.1" placeholder="e.g. 160" />
    </div>
  </div>

  <!-- Feedback -->
  <div *ngIf="errorMessage" class="error-box">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="success-box">{{ successMessage }}</div>

  <button class="btn-primary" (click)="onSubmit()" [disabled]="isLoading">
    {{ isLoading ? 'Saving...' : 'Submit' }}
  </button>

</div>
